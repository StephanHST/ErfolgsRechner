# .github/workflows/build-macos-dmg.yml
name: Build macOS DMG

on:
  workflow_dispatch:
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Java installieren
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Ordner anlegen
        run: |
          mkdir -p out package-input build

      - name: Assets nach out kopieren
        run: |
          mkdir -p out/Java/ErfolgsRechner/assets
          cp ErfolgsRechner/assets/arrowUp.png out/Java/ErfolgsRechner/assets/
          cp ErfolgsRechner/assets/arrowRight.png out/Java/ErfolgsRechner/assets/
          cp ErfolgsRechner/assets/arrowDown.png out/Java/ErfolgsRechner/assets/

      - name: Java kompilieren
        run: |
          find ErfolgsRechner -name "*.java" -print0 | xargs -0 javac -d out

      - name: JAR bauen
        run: |
          jar cfe ErfolgsRechner.jar Java.ErfolgsRechner.ErfolgsRechner -C out .

      - name: JAR vorbereiten
        run: |
          cp ErfolgsRechner.jar package-input/

      - name: DMG bauen
        run: |
          jpackage \
            --input package-input \
            --dest build \
            --name ErfolgsRechner \
            --main-jar ErfolgsRechner.jar \
            --main-class Java.ErfolgsRechner.ErfolgsRechner \
            --type dmg \
            --icon ErfolgsRechner/assets/ErfolgsRechner.icns \
            --app-version 1.2 \
            --vendor "Stephan Hofmann"

      - name: Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: ErfolgsRechner-macos-dmg
          path: build/*.dmg
