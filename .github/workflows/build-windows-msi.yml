name: Build Windows MSI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Java installieren
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Ordner anlegen
        shell: cmd
        run: |
          if not exist out mkdir out
          if not exist package-input mkdir package-input
          if not exist build mkdir build

      - name: Java kompilieren
        shell: cmd
        run: |
          javac -d out ErfolgsRechner.java

      - name: JAR bauen
        shell: cmd
        run: |
          jar cfe ErfolgsRechner.jar Java.ErfolgsRechner -C out .

      - name: JAR vorbereiten
        shell: cmd
        run: |
          copy ErfolgsRechner.jar package-input\

      - name: Windows MSI bauen
        shell: cmd
        run: |
          jpackage ^
            --input package-input ^
            --dest build ^
            --name ErfolgsRechner ^
            --main-jar ErfolgsRechner.jar ^
            --main-class Java.ErfolgsRechner ^
            --type msi ^
            --icon assets\ErfolgsRechner.ico ^
            --win-menu ^
            --win-shortcut ^
            --vendor "Stephan Hofmann"

      - name: Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: ErfolgsRechner-windows
          path: build/*.msi
